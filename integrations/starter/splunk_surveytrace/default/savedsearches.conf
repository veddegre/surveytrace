[SurveyTrace - Event volume by type]
action.email.useNSSubject = 1
alert.track = false
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
enableSched = 0
is_visible = 1
search = `surveytrace_index` \
| spath output=event_type path=event_type \
| spath output=occurred_at path=occurred_at \
| eval t=strptime(occurred_at,"%Y-%m-%dT%H:%M:%SZ") \
| eval t=if(isnull(t),_time,t) \
| bin t span=1h \
| stats count by t event_type
request.ui_dispatch_app = splunk_surveytrace
request.ui_dispatch_view = search

[SurveyTrace - Findings-related events]
action.email.useNSSubject = 1
alert.track = false
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
enableSched = 0
is_visible = 1
search = `surveytrace_index` \
| spath output=event_type path=event_type \
| where like(event_type,"change.%") OR event_type="report.created" \
| spath output=scope_id path=scope.scope_id \
| spath output=scope_name path=scope.scope_name \
| spath output=job_id path=subject.job_id \
| spath output=finding_id path=subject.finding_id \
| spath output=asset_id path=subject.asset_id \
| table _time event_type severity scope_id scope_name job_id finding_id asset_id
request.ui_dispatch_app = splunk_surveytrace
request.ui_dispatch_view = search

[SurveyTrace - Report artifacts]
action.email.useNSSubject = 1
alert.track = false
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
enableSched = 0
is_visible = 1
search = `surveytrace_index` \
| spath output=event_type path=event_type \
| where event_type="report.created" \
| spath output=artifact_id path=payload.artifact_id \
| spath output=job_id path=subject.job_id \
| spath output=title path=payload.title \
| table _time artifact_id job_id title
request.ui_dispatch_app = splunk_surveytrace
request.ui_dispatch_view = search
