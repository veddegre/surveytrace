# Scripted input: disabled by default. Enable in local/inputs.conf after configuring
# local/surveytrace_pull.ini (see README and surveytrace_pull.ini.example).
#
# If the app is installed under a different directory name, adjust the path below
# or use a local/inputs.conf stanza that matches your $SPLUNK_HOME layout.

[script://$SPLUNK_HOME/etc/apps/splunk_surveytrace/bin/surveytrace_events.py]
disabled = 1
interval = 300
index = main
sourcetype = surveytrace:reporting:event
